name: Daily pipeline and publish docs

on:
  schedule:
    - cron: '0 12 * * *'   # daily at 12:00 UTC = 15:00 Vilnius (UTC+3 summer)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pipeline (no email)
        env:
          SEND_EMAIL: 'false'
          REPORT_TRIGGER_API_URL: ${{ vars.REPORT_TRIGGER_API_URL }}
        run: |
          ./.venv/bin/python run_daily_pipeline.py || python run_daily_pipeline.py

      - name: Commit docs (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs || true
          git diff --staged --quiet || (git commit -m "chore: update docs (publish)" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main)
