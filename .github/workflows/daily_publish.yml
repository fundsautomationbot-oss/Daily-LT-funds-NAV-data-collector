name: Daily pipeline and publish docs

on:
  schedule:
    # Union of DST and non-DST UTC slots; gate below enforces exact 15-18 LT execution.
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Run outside 15-18 Europe/Vilnius window'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate schedule to 15:00-18:59 Europe/Vilnius
        id: local_time_gate
        shell: bash
        run: |
          force_run="${{ github.event.inputs.force_run || 'false' }}"
          force_run="$(echo "$force_run" | tr '[:upper:]' '[:lower:]')"
          if [[ "$force_run" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Force run enabled: bypassing time gate."
            exit 0
          fi

          local_hour="$(TZ=Europe/Vilnius date +%H)"
          if [[ "$local_hour" =~ ^(15|16|17|18)$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping. Local Europe/Vilnius time is $(TZ=Europe/Vilnius date '+%Y-%m-%d %H:%M:%S %Z')."
          fi

      - name: Skip if yesterday's report already published
        if: steps.local_time_gate.outputs.run == 'true'
        id: check_existing
        run: |
          YESTERDAY=$(TZ=Europe/Vilnius date -d "yesterday" +%Y-%m-%d)
          if ls docs/pension_data_combined_${YESTERDAY}.html 2>/dev/null; then
            echo "Report for ${YESTERDAY} already exists. Skipping pipeline."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.local_time_gate.outputs.run == 'true' && steps.check_existing.outputs.skip != 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.local_time_gate.outputs.run == 'true' && steps.check_existing.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install --with-deps chromium

      - name: Run pipeline (no email)
        if: steps.local_time_gate.outputs.run == 'true' && steps.check_existing.outputs.skip != 'true'
        env:
          SEND_EMAIL: 'false'
          REPORT_TRIGGER_API_URL: ${{ vars.REPORT_TRIGGER_API_URL }}
          # Proxy only for Luminor — other scrapers run without it
          LUMINOR_PROXY_SERVER: ${{ secrets.LUMINOR_PROXY_SERVER }}
          LUMINOR_PROXY_USERNAME: ${{ secrets.LUMINOR_PROXY_USERNAME }}
          LUMINOR_PROXY_PASSWORD: ${{ secrets.LUMINOR_PROXY_PASSWORD }}

          LUMINOR_BROWSER_RETRIES: '6'
          LUMINOR_ALLOW_STALE_ON_BLOCK: 'true'
        run: |
          ./.venv/bin/python run_daily_pipeline.py || python run_daily_pipeline.py

      - name: Commit docs (if changed)
        if: steps.local_time_gate.outputs.run == 'true' && steps.check_existing.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs || true
          git diff --staged --quiet || (git commit -m "chore: update docs (publish)" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main)

      - name: Send status email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          JOB_STATUS: ${{ job.status }}
          LOCAL_GATE: ${{ steps.local_time_gate.outputs.run }}
          SKIPPED: ${{ steps.check_existing.outputs.skip }}
        run: |
          python - <<'EOF'
          import os, json, smtplib
          from email.mime.text import MIMEText
          from email.utils import formatdate
          from pathlib import Path

          gmail_user = os.environ.get("GMAIL_USER", "")
          gmail_pass = os.environ.get("GMAIL_PASSWORD", "")
          recipient  = os.environ.get("RECIPIENT_EMAIL", "")
          status     = os.environ.get("JOB_STATUS", "unknown")
          local_gate = os.environ.get("LOCAL_GATE", "false")
          skipped    = os.environ.get("SKIPPED", "false")
          run_url    = f"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if not gmail_user or not gmail_pass or not recipient:
              print("Status email skipped: Gmail credentials not configured")
              exit(0)

          # Read per-scraper results if available
          summary_path = Path("pipeline_summary.json")
          scraper_lines = ""
          failed_scrapers = []
          if summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text())
                  scrapers = summary.get("scrapers", {})
                  failed_scrapers = summary.get("failed", [])
                  lines = []
                  for name, result in scrapers.items():
                      icon = "✅" if result == "ok" else "❌"
                      lines.append(f"  {icon} {name}: {result}")
                  scraper_lines = "\nScraper results:\n" + "\n".join(lines)
              except Exception:
                  pass

          if local_gate != "true":
              subject = "⏭️ LT Pension pipeline – skipped (outside 15:00-18:59 Vilnius window)"
              body = f"The scheduled trigger fired, but local-time gate skipped execution.\n\nRun: {run_url}"
          elif skipped == "true":
              subject = "⏭️ LT Pension pipeline – skipped (report already exists)"
              body = f"The pipeline was skipped — yesterday's report already exists in docs/.\n\nRun: {run_url}"
          elif failed_scrapers:
              subject = f"⚠️ LT Pension pipeline – completed with {len(failed_scrapers)} failure(s)"
              body = f"The pipeline completed but some scrapers failed.\n{scraper_lines}\n\nRun: {run_url}"
          elif status == "success":
              subject = "✅ LT Pension pipeline – all scrapers succeeded"
              body = f"All scrapers ran successfully and new data was published.\n{scraper_lines}\n\nRun: {run_url}"
          else:
              subject = "❌ LT Pension pipeline – failed"
              body = f"The pipeline run finished with status: {status}\n{scraper_lines}\n\nCheck the logs:\n{run_url}"

          recipients = [r.strip() for r in recipient.split(",") if r.strip()]
          msg = MIMEText(body, "plain", "utf-8")
          msg["From"] = gmail_user
          msg["To"] = ", ".join(recipients)
          msg["Date"] = formatdate(localtime=True)
          msg["Subject"] = subject

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_pass)
              server.send_message(msg, to_addrs=recipients)

          print(f"Status email sent: {subject}")
          EOF
