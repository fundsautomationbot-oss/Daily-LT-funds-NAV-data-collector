name: Luminor scraper check

on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  luminor-only:
    runs-on: ubuntu-latest
    env:
      LUMINOR_PROXY_SERVER: ${{ secrets.PLAYWRIGHT_PROXY_SERVER }}
      LUMINOR_PROXY_USERNAME: ${{ secrets.PLAYWRIGHT_PROXY_USERNAME }}
      LUMINOR_PROXY_PASSWORD: ${{ secrets.PLAYWRIGHT_PROXY_PASSWORD }}
      LUMINOR_BROWSER_RETRIES: '6'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Luminor scraper only
        continue-on-error: true
        run: python sources/luminor_pensions.py

      - name: Upload Luminor output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luminor-output
          path: |
            luminor_pensions_data_*.xlsx
          if-no-files-found: warn