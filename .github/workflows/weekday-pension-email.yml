name: Daily Pension Automation

on:
  workflow_dispatch:
  schedule:
    # 07:00 Europe/Vilnius on weekdays only (Monday-Friday)
    - cron: "0 4 * * 1-5"
    - cron: "0 5 * * 1-5"

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Pipeline and notification credentials
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      # Optional proxy support for cloud runners
      PLAYWRIGHT_PROXY_SERVER: ${{ secrets.PLAYWRIGHT_PROXY_SERVER }}
      PLAYWRIGHT_PROXY_USERNAME: ${{ secrets.PLAYWRIGHT_PROXY_USERNAME }}
      PLAYWRIGHT_PROXY_PASSWORD: ${{ secrets.PLAYWRIGHT_PROXY_PASSWORD }}

      # Browser runtime flags
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      # Run Playwright in headless mode on GitHub Actions for reliability
      PLAYWRIGHT_HEADLESS: "true"
      # Ensure Python prints stdout/stderr unbuffered so Actions shows live logs
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Gate schedule to exactly 07:00 Europe/Vilnius
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=Europe/Vilnius date +%H)"
          local_minute="$(TZ=Europe/Vilnius date +%M)"

          if [[ "$local_hour" == "07" && "$local_minute" == "00" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping. Local Europe/Vilnius time is $(TZ=Europe/Vilnius date '+%Y-%m-%d %H:%M:%S %Z')."
          fi

      - name: Install dependencies
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate required environment variables
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          echo "GMAIL_USER: ${GMAIL_USER:+set}"
          echo "GMAIL_PASSWORD: ${GMAIL_PASSWORD:+set}"
          echo "RECIPIENT_EMAIL: ${RECIPIENT_EMAIL:+set}"
          if [[ -z "$GMAIL_USER" || -z "$GMAIL_PASSWORD" || -z "$RECIPIENT_EMAIL" ]]; then
            echo "ERROR: Missing required secrets: GMAIL_USER, GMAIL_PASSWORD, RECIPIENT_EMAIL"
            exit 1
          fi

      - name: Run automation wrapper
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          source .venv/bin/activate
          # Use unbuffered Python to stream scraper logs live in Actions
          xvfb-run -a python -u main_wrapper.py

      - name: Upload logs and generated files
        if: steps.schedule_gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-artifacts
          path: |
            logs/*.log
            *_data_*.xlsx
            pension_data_combined_*.xlsx
            artifacts/**
          if-no-files-found: warn
