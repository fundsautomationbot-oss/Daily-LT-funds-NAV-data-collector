<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily pension data</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-50 text-slate-900 antialiased">
<div class="min-h-screen px-4 py-8 sm:px-6 lg:px-8">
  <main class="mx-auto w-full max-w-7xl">
    <section class="rounded-[32px] border border-slate-200 bg-white/95 p-6 shadow-[0_30px_80px_-40px_rgba(15,23,42,0.35)]">
      <div class="flex flex-col gap-6">
        <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Daily pension funds</p>
            <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl">Single-page dashboard</h1>
            <p class="mt-3 max-w-2xl text-base leading-7 text-slate-600">Choose a date and view the full report below without leaving this page.</p>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <label class="text-sm font-medium text-slate-700" for="report-select">Report date</label>
            <select id="report-select" class="rounded-full border border-slate-300 bg-slate-50 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200"></select>
            <a id="download-link" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700" href="#" download>Download Excel</a>
          </div>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4 text-sm text-slate-600">
          The report table is loaded directly below for the selected date.
        </div>
        <iframe id="report-frame" title="Pension report viewer" src="pension_data_combined_2026-06-02.html" class="h-[76vh] w-full rounded-3xl border border-slate-200 bg-white"></iframe>
      </div>
    </section>
  </main>
</div>
<script>
const reports = [
{date: "2026-06-02", html: "pension_data_combined_2026-06-02.html", xlsx: "pension_data_combined_2026-06-02.xlsx"}
];
function byNewest(a, b) { return b.date.localeCompare(a.date); }
function setSelection(report) {
  const frame = document.getElementById('report-frame');
  const link = document.getElementById('download-link');
  frame.src = report.html + '?t=' + Date.now();
  link.href = report.xlsx;
}
function initIndex() {
  const select = document.getElementById('report-select');
  const sorted = reports.slice().sort(byNewest);
  sorted.forEach(function(report){
    const option = document.createElement('option');
    option.value = report.date;
    option.textContent = report.date;
    select.appendChild(option);
  });
  const newest = sorted[0];
  if (newest) {
    select.value = newest.date;
    setSelection(newest);
  }
  select.addEventListener('change', function(){
    const selected = reports.find(function(r){ return r.date === select.value; });
    if (selected) setSelection(selected);
  });
}
document.addEventListener('DOMContentLoaded', initIndex);
</script>
</body></html>
