<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily pension reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-50 text-slate-900 antialiased">
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <main class="w-full max-w-4xl">
    <section class="rounded-[32px] border border-slate-200 bg-white/95 p-8 shadow-[0_30px_80px_-40px_rgba(15,23,42,0.35)] backdrop-blur-xl">
      <div class="flex flex-col gap-6 md:gap-8">
        <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Modern fund archive</p>
            <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl">Daily pension reports</h1>
            <p class="mt-3 max-w-2xl text-base leading-7 text-slate-600">Minimal, easy-to-scan history for your latest daily pension data exports.</p>
          </div>
          <div class="rounded-3xl bg-slate-900 px-5 py-4 text-right text-white shadow-lg shadow-slate-200/10">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-300">Report archive</p>
            <p id="result-count" class="mt-2 text-2xl font-semibold">Loading...</p>
          </div>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Start date</span>
            <input id="start-date" type="date" class="mt-2 w-full rounded-3xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200" />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">End date</span>
            <input id="end-date" type="date" class="mt-2 w-full rounded-3xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200" />
          </label>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4 text-slate-600">
          Showing the most recent 14 days by default. Adjust the date range to find the latest report.
        </div>
        <div id="range-warning" class="min-h-[2rem] text-sm font-medium text-amber-700"></div>
        <ul id="report-list" class="grid gap-4"></ul>
      </div>
    </section>
  </main>
</div>
<script>
const reports = [
{date: "2026-06-02", html: "pension_data_combined_2026-06-02.html", xlsx: "pension_data_combined_2026-06-02.xlsx"}
];
const maxDays = 14;
function toISO(date) {
  return date.toISOString().slice(0, 10);
}
function parseISO(value) {
  return new Date(value + "T00:00:00Z");
}
function clampDateRange(start, end) {
  const startDate = parseISO(start);
  const endDate = parseISO(end);
  const diff = (endDate - startDate) / 86400000;
  if (diff > maxDays - 1) {
    startDate.setDate(endDate.getDate() - (maxDays - 1));
    return {start: toISO(startDate), end};
  }
  return {start, end};
}
function renderReports() {
  const start = document.getElementById('start-date').value;
  const end = document.getElementById('end-date').value;
  const clamped = clampDateRange(start, end);
  if (clamped.start !== start) {
    document.getElementById('range-warning').textContent = 'Range limited to 14 days.';
    document.getElementById('start-date').value = clamped.start;
  } else {
    document.getElementById('range-warning').textContent = '';
  }
  const filtered = reports.filter(r => r.date >= clamped.start && r.date <= clamped.end);
  document.getElementById('result-count').textContent = `${filtered.length} report${filtered.length === 1 ? '' : 's'} available`;
  const list = document.getElementById('report-list');
  list.innerHTML = filtered.length ? filtered.map(r => `
    <li class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-1 hover:shadow-md">
      <div class="flex items-center justify-between gap-4">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-400">${r.date}</p>
          <p class="mt-2 text-base text-slate-700">${r.html}</p>
        </div>
        <div class="flex gap-2">
          <a class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700" href="${r.html}">Open</a>
          <a class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100" href="${r.xlsx}" download>Download</a>
        </div>
      </div>
    </li>`).join('') : '<li class="rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-8 text-center text-slate-500">No reports match the selected range.</li>';
}
function initIndex() {
  const dates = reports.map(r => r.date).sort();
  const latest = dates[dates.length - 1];
  const earliest = dates[0];
  const latestDate = parseISO(latest);
  const defaultStart = new Date(latestDate);
  defaultStart.setDate(latestDate.getDate() - maxDays + 1);
  const startVal = defaultStart < parseISO(earliest) ? earliest : toISO(defaultStart);
  document.getElementById('start-date').value = startVal;
  document.getElementById('end-date').value = latest;
  document.getElementById('start-date').min = earliest;
  document.getElementById('start-date').max = latest;
  document.getElementById('end-date').min = earliest;
  document.getElementById('end-date').max = latest;
  document.getElementById('start-date').addEventListener('change', renderReports);
  document.getElementById('end-date').addEventListener('change', renderReports);
  renderReports();
}
document.addEventListener('DOMContentLoaded', initIndex);
</script>
</body></html>
