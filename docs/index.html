<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily pension reports</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head><body>
<div class="wrap"><div class="card">
  <div class="header">
    <div>
      <h1 class="title">Pension report history</h1>
      <div class="meta">Choose a date range (maximum 14 days) to show downloadable reports.</div>
    </div>
  </div>
  <div class="report-filter">
    <label>
      Start date
      <input id="start-date" type="date" />
    </label>
    <label>
      End date
      <input id="end-date" type="date" />
    </label>
    <p class="range-note">Showing the most recent 14 days by default.</p>
  </div>
  <div class="range-warning" id="range-warning"></div>
  <ul class="report-list" id="report-list"></ul>
</div></div>
<script>
const reports = [
{date: "2026-06-02", html: "pension_data_combined_2026-06-02.html", xlsx: "pension_data_combined_2026-06-02.xlsx"}
];
const maxDays = 14;
function toISO(date) {
  return date.toISOString().slice(0, 10);
}
function parseISO(value) {
  return new Date(value + "T00:00:00Z");
}
function clampDateRange(start, end) {
  const startDate = parseISO(start);
  const endDate = parseISO(end);
  const diff = (endDate - startDate) / 86400000;
  if (diff > maxDays - 1) {
    startDate.setDate(endDate.getDate() - (maxDays - 1));
    return {start: toISO(startDate), end};
  }
  return {start, end};
}
function renderReports() {
  const start = document.getElementById('start-date').value;
  const end = document.getElementById('end-date').value;
  const clamped = clampDateRange(start, end);
  if (clamped.start !== start) {
    document.getElementById('range-warning').textContent = 'Range limited to 14 days.';
    document.getElementById('start-date').value = clamped.start;
  } else {
    document.getElementById('range-warning').textContent = '';
  }
  const filtered = reports.filter(r => r.date >= clamped.start && r.date <= clamped.end);
  const list = document.getElementById('report-list');
  list.innerHTML = filtered.length ? filtered.map(r => `
    <li class="report-card">
      <div class="report-summary">
        <strong>${{r.date}}</strong>
      </div>
      <div class="report-links">
        <a class="link-pill" href="${{r.html}}">View HTML</a>
        <a class="link-pill" href="${{r.xlsx}}" download>Download XLSX</a>
      </div>
    </li>`).join('') : '<li class="report-empty">No reports match the selected range.</li>';
}
function initIndex() {
  const dates = reports.map(r => r.date).sort();
  const latest = dates[dates.length - 1];
  const earliest = dates[0];
  const latestDate = parseISO(latest);
  const defaultStart = new Date(latestDate);
  defaultStart.setDate(latestDate.getDate() - maxDays + 1);
  const startVal = defaultStart < parseISO(earliest) ? earliest : toISO(defaultStart);
  document.getElementById('start-date').value = startVal;
  document.getElementById('end-date').value = latest;
  document.getElementById('start-date').min = earliest;
  document.getElementById('start-date').max = latest;
  document.getElementById('end-date').min = earliest;
  document.getElementById('end-date').max = latest;
  document.getElementById('start-date').addEventListener('change', renderReports);
  document.getElementById('end-date').addEventListener('change', renderReports);
  renderReports();
}
document.addEventListener('DOMContentLoaded', initIndex);
</script>
</body></html>
