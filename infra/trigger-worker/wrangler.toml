name = "daily-lt-funds-trigger"
main = "worker.js"
compatibility_date = "2026-06-04"

[triggers]
crons = [
  "40 10 8 6 *",  # TEMP one-time test: 2026-06-08 10:40 UTC = 13:40 Vilnius
  "0 12 * * *",   # 12:00 UTC = 15:00 Vilnius
  "0 13 * * *",   # 13:00 UTC = 16:00 Vilnius
  "0 14 * * *",   # 14:00 UTC = 17:00 Vilnius
  "0 15 * * *",   # 15:00 UTC = 18:00 Vilnius
]

[vars]
# Comma-separated list of allowed origins, e.g. "https://fundsautomationbot-oss.github.io"
ALLOWED_ORIGINS = "https://fundsautomationbot-oss.github.io"
# Optional public key for lightweight abuse protection (set empty to disable)
PUBLIC_TRIGGER_KEY = ""
# owner/repo
GITHUB_REPOSITORY = "fundsautomationbot-oss/Daily-LT-funds-NAV-data-collector"
# Workflow file name inside .github/workflows
GITHUB_WORKFLOW_FILE = "daily_publish.yml"
# Branch/tag ref for workflow_dispatch
GITHUB_WORKFLOW_REF = "main"
